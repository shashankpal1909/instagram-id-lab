version: '3.8'

services:
  pg1:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instagram
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instagram"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg2:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instagram
    ports:
      - "5434:5432"
    volumes:
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instagram"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg3:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instagram
    ports:
      - "5435:5432"
    volumes:
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instagram"]
      interval: 5s
      timeout: 5s
      retries: 5
